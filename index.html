<!doctype html>
<html lang="en">
  <head>
    <!-- Basic HTML (required) -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Favicons / App Icons / PWA -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#15141a">
    <meta name="msapplication-TileColor" content="#15141a">
    <meta name="msapplication-TileImage" content="/favicon-144x144.png">

    <!-- Preload the LCP hero image so the browser discovers it immediately -->
    <link rel="preload" as="image" href="/images/iso1.webp" fetchpriority="high" />

    <!-- Google Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap&subset=latin" rel="stylesheet" />

    <!-- Performance / Accessibility -->
    <meta name="color-scheme" content="light dark">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="format-detection" content="telephone=no">
    
    <!-- Resource hints for Mailchimp (Subscribe component) -->
    <link rel="dns-prefetch" href="https://smallsided.us9.list-manage.com">
    
    <!-- 
      NOTE: All SEO meta tags (title, description, keywords, OG tags, Twitter cards, 
      canonical, robots, structured data) are now managed by react-helmet-async 
      on a per-page basis. Do not add them here as they will conflict.
    -->

    <!-- Critical inline styles for instant first paint -->
    <style>
      /* Base reset and dark background */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body { margin: 0; padding: 0; overflow-x: hidden; background-color: #15141a; color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }

      /* Skeleton hero — matches IntroHero.module.scss */
      .skeleton-hero { display: flex; flex-direction: row; width: 100%; }
      .skeleton-hero-img {
        flex: 0 0 50%; width: 50%; background-color: #f8f9fa;
        display: flex; align-items: center; justify-content: center;
        padding: 60px; position: relative; overflow: hidden;
      }
      .skeleton-hero-img img { width: 400px; height: 400px; object-fit: cover; }
      .skeleton-hero-text {
        flex: 0 0 50%; width: 50%; background-color: #f8f9fa;
        display: flex; align-items: center; justify-content: center; padding: 80px;
      }
      .skeleton-hero-text-inner { max-width: 520px; width: 100%; }
      .skeleton-hero-text h1 {
        font-family: 'Inter', sans-serif; font-size: 3.5rem; font-weight: 900;
        color: #15141a; line-height: 1.1; margin-bottom: 24px; letter-spacing: -0.02em;
      }
      .skeleton-hero-text p {
        font-size: 1.25rem; line-height: 1.7; color: #15141a;
        font-weight: 400; margin-bottom: 32px;
      }
      .skeleton-hero-text a {
        display: inline-block; padding: 16px 32px; font-family: 'Inter', sans-serif;
        font-size: 1rem; font-weight: 600; background-color: transparent;
        border: 2px solid #15141a; border-radius: 0.5rem;
        text-decoration: none; color: #15141a;
      }
      @media (max-width: 768px) {
        .skeleton-hero { flex-direction: column; }
        .skeleton-hero-img, .skeleton-hero-text { flex: 1 1 auto; width: 100%; }
        .skeleton-hero-img { order: 1; padding: 40px 24px; }
        .skeleton-hero-text { order: 2; padding: 40px 24px; }
        .skeleton-hero-img img { width: 300px; height: 300px; }
        .skeleton-hero-text h1 { font-size: 2.5rem; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Static shell with real hero content for instant LCP -->
      <div style="min-height:100vh; background-color:#15141a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif; display:flex; flex-direction:column;">
        
        <!-- Header skeleton -->
        <header style="height:112px; flex-shrink:0; display:flex; align-items:center; padding:0 2rem; background-color:#15141a;">
          <div style="width:160px; height:40px;"></div>
        </header>
        
        <!-- Real hero content — matches IntroHero component exactly -->
        <main style="flex:1;">
          <section class="skeleton-hero">
            <div class="skeleton-hero-img">
              <img 
                src="/images/iso1.webp" 
                alt="Small-sided soccer isometric illustration" 
                width="400" 
                height="400" 
                fetchpriority="high"
              />
            </div>
            <div class="skeleton-hero-text">
              <div class="skeleton-hero-text-inner">
                <h1>The Future of Youth Soccer is Small-Sided</h1>
                <p>More touches. More decisions. More development. Discover why the world's best academies are choosing small-sided formats to develop tomorrow's stars.</p>
                <a href="#row1">Learn More</a>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- Noscript fallback -->
    <noscript>
      <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background-color:#15141a; color:#fff; padding:20px; text-align:center;">
        <div>
          <h1 style="margin:0 0 10px 0;">Smallsided</h1>
          <p style="margin:0;">Please enable JavaScript to use this site.</p>
        </div>
      </div>
    </noscript>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Analytics - Only loaded on first user interaction -->
    <script>
      (function() {
        var loaded = false;
        function load() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-6RDDRZT1DN';
          s.onload = function() {
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-6RDDRZT1DN', { 'anonymize_ip': true });
          };
          document.head.appendChild(s);
        }
        ['click', 'scroll', 'keypress', 'touchstart'].forEach(function(e) {
          document.addEventListener(e, function() { setTimeout(load, 100); }, { once: true, passive: true });
        });
      })();
    </script>
  </body>
</html>
