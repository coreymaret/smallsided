# -----------------------------
# NETLIFY BUILD CONFIGURATION
# -----------------------------

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# -------------------------------------
# BUILD ENVIRONMENT CONFIGURATION
# -------------------------------------

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_GOOGLE_MAPS_KEY,VITE_SUPABASE_ANON_KEY,VITE_STRIPE_PUBLISHABLE_KEY,VITE_INTERNAL_SECRET"

# -------------------------------------
# SERVERLESS FUNCTIONS CONFIGURATION
# -------------------------------------

[functions]
  node_bundler = "esbuild"

# Scheduled function — runs daily at 9am UTC (5am EST)
[functions.send-reminders]
  schedule = "0 9 * * *"

# -------------------------------------
# URL REDIRECTS
# -------------------------------------

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# -------------------------------------
# SECURITY HEADERS
# -------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# -------------------------------------
# CACHING HEADERS
# -------------------------------------

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# -------------------------------------
# CORS HEADERS FOR API
# -------------------------------------

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, stripe-signature, x-internal-secret"